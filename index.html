<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Gym Bro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg-primary: #000000;
    --bg-surface: #121212;
    --bg-card: #1e1e1e;
    --accent: #00ff66;
    --accent-hover: #00cc52;
    --text-primary: #ffffff;
    --text-secondary: #aaaaaa;
    --text-muted: #666666;
    --border: #2c2c2c;
    --radius-pill: 9999px;
    --radius-card: 16px;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Barlow', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
    min-height: 100vh;
  }

  .condensed {
    font-family: 'Barlow Condensed', sans-serif;
    text-transform: uppercase;
    font-weight: 800;
  }

  /* App Container / Screen handling */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
    background: radial-gradient(circle at top right, rgba(0, 255, 102, 0.05), transparent 60%);
  }

  #main-app {
    display: none;
    padding-bottom: 90px;
  }

  /* Auth UI Componentry */
  .brand-logo {
    font-size: 3.5rem;
    font-style: italic;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -1px;
    color: var(--text-primary);
  }

  .brand-logo span {
    color: var(--accent);
  }

  .tagline {
    color: var(--text-secondary);
    font-size: 1.1rem;
    margin-bottom: 40px;
    font-weight: 400;
  }

  .auth-card {
    width: 100%;
    max-width: 400px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 32px 24px;
    border-radius: var(--radius-card);
  }

  .pill-button {
    width: 100%;
    padding: 16px 28px;
    border-radius: var(--radius-pill);
    border: none;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pill-button.primary {
    background-color: var(--accent);
    color: var(--bg-primary);
  }

  .pill-button.primary:hover {
    background-color: var(--accent-hover);
    transform: translateY(-1px);
  }

  .pill-button.google {
    background-color: var(--text-primary);
    color: var(--bg-primary);
    margin-top: 16px;
  }

  .pill-button.google:hover {
    background-color: #e6e6e6;
    transform: translateY(-1px);
  }

  .pill-button svg {
    width: 20px;
    height: 20px;
  }

  /* Main Navigation Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-logo {
    font-size: 1.8rem;
    font-style: italic;
  }

  .header-logo span {
    color: var(--accent);
  }

  .profile-avatar {
    width: 38px;
    height: 38px;
    border-radius: var(--radius-pill);
    border: 2px solid var(--accent);
    cursor: pointer;
    object-fit: cover;
  }

  /* Content Containers */
  .container {
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
  }

  .section-title {
    font-size: 1.5rem;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  /* Dashboard Cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .metric-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: var(--radius-card);
    position: relative;
    overflow: hidden;
  }

  .metric-label {
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .metric-value {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text-primary);
  }

  .metric-value span {
    font-size: 1rem;
    color: var(--accent);
    margin-left: 4px;
  }

  /* Bottom Navigation Hub */
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(18, 18, 18, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
    z-index: 90;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.75rem;
    font-weight: 600;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s ease;
  }

  .nav-item.active {
    color: var(--accent);
  }

  .nav-item svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
  }

  /* Sheets System */
  .sheet-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .sheet-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    max-height: 85vh;
    overflow-y: auto;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 24px;
  }

  .bottom-sheet.show {
    transform: translateY(0);
  }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: var(--radius-pill);
    margin: -12px auto 20px auto;
  }

  .sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  /* Global Toast System */
  #toast-container {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    width: calc(100% - 40px);
    max-width: 350px;
    pointer-events: none;
  }

  .toast {
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 18px;
    border-radius: var(--radius-pill);
    color: var(--text-primary);
    font-size: 0.95rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  .toast.success { border-left: 4px solid var(--accent); }
  .toast.error { border-left: 4px solid #ff3b30; }

  .toast svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="auth-screen">
  <h1 class="brand-logo condensed">GYM <span>BRO</span></h1>
  <p class="tagline">Track parameters. Smash barriers.</p>
  
  <div class="auth-card">
    <button type="button" id="google-signin-btn" class="pill-button google">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.69c-.29 1.5-1.14 2.77-2.4 3.63v3.02h3.86c2.26-2.08 3.59-5.14 3.59-8.5z"/>
        <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3.02c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96H1.21v3.11C3.18 21.88 7.31 24 12 24z"/>
        <path fill="#FBBC05" d="M5.27 14.27c-.24-.72-.38-1.49-.38-2.27s.14-1.55.38-2.27V6.62H1.21C.44 8.16 0 9.88 0 12s.44 3.84 1.21 5.38l4.06-3.11z"/>
        <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.44-3.44C17.93 1.19 15.22 0 12 0 7.31 0 3.18 2.12 1.21 5.38l4.06 3.11c.95-2.85 3.6-4.96 6.73-4.96z"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<div id="main-app">
  <header>
    <div class="header-logo condensed">GYM <span>BRO</span></div>
    <img id="user-avatar" class="profile-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666666'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Profile" onclick="openSheet('profile-sheet')">
  </header>

  <main class="container">
    <h2 class="section-title condensed">Dashboard</h2>
    <div class="stat-grid">
      <div class="metric-card">
        <div class="metric-label">Completed Workouts</div>
        <div id="dash-workouts" class="metric-value">0<span>sets</span></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Total Volume</div>
        <div id="dash-volume" class="metric-value">0<span>kg</span></div>
      </div>
    </div>
  </main>

  <nav class="nav-bar">
    <button class="nav-item active" onclick="switchTab('dashboard')">
      <svg viewBox="0 0 24 24"><path d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/></svg>
      Dashboard
    </button>
    <button class="nav-item" onclick="openSheet('workout-sheet')">
      <svg viewBox="0 0 24 24"><path d='M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'/></svg>
      Log Lift
    </button>
    <button class="nav-item" onclick="switchTab('community')">
      <svg viewBox="0 0 24 24"><path d='M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 1.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z'/></svg>
      Swole-cial
    </button>
  </nav>
</div>

<div id="sheet-overlay" class="sheet-overlay" onclick="closeAllSheets()"></div>

<div id="profile-sheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h3 class="condensed" style="font-size: 1.5rem;">Your Profile</h3>
    <button onclick="closeSheet('profile-sheet')" style="background:none; border:none; color:var(--text-secondary); font-size:1.5rem; cursor:pointer;">&times;</button>
  </div>
  <div style="text-align: center; margin-bottom: 24px;">
    <img id="profile-sheet-avatar" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 12px; object-fit: cover;" src="" alt="Avatar">
    <h4 id="profile-name" style="font-size: 1.3rem; margin-bottom: 4px;">Gym Bro</h4>
    <p id="profile-email" style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px;">bro@gym.com</p>
    <button class="pill-button primary" onclick="handleSignOut()" style="background-color: #ff3b30; color: white;">Sign Out</button>
  </div>
</div>

<div id="workout-sheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h3 class="condensed" style="font-size: 1.5rem;">Record Session</h3>
    <button onclick="closeSheet('workout-sheet')" style="background:none; border:none; color:var(--text-secondary); font-size:1.5rem; cursor:pointer;">&times;</button>
  </div>
  <p style="color: var(--text-secondary); margin-bottom: 16px;">Log your standard parameters below:</p>
  <button class="pill-button primary" onclick="simulateLog()">Log Dynamic Blueprint</button>
</div>

<script>
// ══════════════════════════════════════════════
// FIREBASE ENVIRONMENT CONFIGURATION
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
  projectId: "YOUR_FIREBASE_PROJECT_ID",
  storageBucket: "YOUR_FIREBASE_STORAGE_BUCKET",
  messagingSenderId: "YOUR_FIREBASE_MESSAGING_SENDER_ID",
  appId: "YOUR_FIREBASE_APP_ID"
};

// Initialize Production instance
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

// ══════════════════════════════════════════════
// APPLICATION LIFECYCLE & AUTH OBSERVER
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Wire up Google Sign-in Trigger Explicitly
  const googleBtn = document.getElementById('google-signin-btn');
  if (googleBtn) {
    googleBtn.addEventListener('click', handleGoogleSignIn);
  }

  // Handle Reactive Global Auth State
  auth.onAuthStateChanged((user) => {
    if (user) {
      // Direct session validation successful -> Sync state
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      
      // Inject standard responsive metadata
      if (user.photoURL) {
        document.getElementById('user-avatar').src = user.photoURL;
        document.getElementById('profile-sheet-avatar').src = user.photoURL;
      }
      document.getElementById('profile-name').textContent = user.displayName || 'Gym Bro';
      document.getElementById('profile-email').textContent = user.email || '';
      
      loadDashboardData(user.uid);
    } else {
      // Clean display contextual tracking
      document.getElementById('main-app').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
    }
  });
});

// ══════════════════════════════════════════════
// GOOGLE AUTHENTICATION LOGIC FLOW
// ══════════════════════════════════════════════
function handleGoogleSignIn(e) {
  if (e) e.preventDefault();
  
  const provider = new firebase.auth.GoogleAuthProvider();
  
  // Custom optimization param to force account choosing overlay smooth handling
  provider.setCustomParameters({ prompt: 'select_account' });

  showToast('Connecting to Google...', 'success');

  auth.signInWithPopup(provider)
    .then((result) => {
      const user = result.user;
      showToast(`Welcome back, ${user.displayName || 'Bro'}!`);
      
      // Initialize core user document inside Firestore if record is fresh
      return db.collection('users').doc(user.uid).set({
        uid: user.uid,
        displayName: user.displayName,
        email: user.email,
        photoURL: user.photoURL,
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    })
    .catch((error) => {
      console.error("Google Authentication Failure Exception Details:", error);
      
      // Contextual Error Handling
      if (error.code === 'auth/popup-closed-by-user') {
        showToast('Sign-in cancelled.', 'error');
      } else if (error.code === 'auth/auth-domain-config-required') {
        showToast('Configuration error. Auth domain missing.', 'error');
      } else {
        showToast(error.message || 'Authentication pipeline failed.', 'error');
      }
    });
}

function handleSignOut() {
  closeAllSheets();
  auth.signOut()
    .then(() => {
      showToast('Logged out successfully.');
    })
    .catch((error) => {
      showToast('Error signing out', 'error');
    });
}

// ══════════════════════════════════════════════
// DATA LOGIC & CORE UTILITIES
// ══════════════════════════════════════════════
function loadDashboardData(uid) {
  // Dynamic metrics lookups mapping database pipelines
  db.collection('users').doc(uid).collection('workouts')
    .get()
    .then((snapshot) => {
      let totalVolume = 0;
      let setCounter = snapshot.size * 4; // Mock calculation metric rule
      
      document.getElementById('dash-workouts').innerHTML = `${setCounter}<span>sets</span>`;
      document.getElementById('dash-volume').innerHTML = `${totalVolume}<span>kg</span>`;
    })
    .catch(err => console.log("Data retrieval error:", err));
}

function simulateLog() {
  showToast('Workout verified and logged!');
  closeSheet('workout-sheet');
}

function switchTab(target) {
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
  // Event target visualization updates
  showToast(`Switched to tracking node: ${target}`);
}

// ══════════════════════════════════════════════
// SHEETS VISUAL CONTROLLER ENGINE
// ══════════════════════════════════════════════
function openSheet(id) {
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById(id).classList.add('show');
}

function closeSheet(id) {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById(id).classList.remove('show');
}

function closeAllSheets() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('show'));
}

// ══════════════════════════════════════════════
// GLOBAL TOAST NOTIFICATION COMPONENT
// ══════════════════════════════════════════════
function showToast(msg, type='success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  
  const icons = { 
    success: '<svg viewBox="0 0 24 24"><path fill="%2300ff66" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>', 
    error: '<svg viewBox="0 0 24 24"><path fill="%23ff3b30" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>' 
  };
  
  toast.innerHTML = `
    <svg style="width:20px; height:20px;" viewBox="0 0 24 24">
      ${type === 'success' ? '<path fill="%2300ff66" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>' : '<path fill="%23ff3b30" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>'}
    </svg>
    <span>${msg}</span>
  `;
  
  container.appendChild(toast);
  
  // Micro-task render cycle animation trigger
  setTimeout(() => toast.classList.add('show'), 50);
  
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}
</script>
</body>
</html>
